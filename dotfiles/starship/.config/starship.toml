scan_timeout    = 10
command_timeout = 500
add_newline     = true

# Explicit format — only listed modules are scanned (fast).
# Colors: inherited from terminal theme (Ghostty Gruvbox Material Dark)
# yellow=3 green=2 red=1 cyan=6 bright-black=8
format = """
$username$localip$directory$git_branch$git_commit$git_status\
$nodejs$golang$python$rust$java$kotlin$lua$php$ruby$swift$zig\
$docker_context$package$aws$conda$nix_shell$buf\
$line_break$character"""

# Right prompt — auto-hides when cursor gets close (no width = invisible)
right_format = "$cmd_duration"

# ─── Prompt character ─────────────────────────────────────────────────────────
[character]
success_symbol = "[❯](bold #a9b665)"
error_symbol   = "[❯](bold #e46876)"

# ─── Identity ─────────────────────────────────────────────────────────────────
[username]
show_always = true
style_user  = "bold green"
style_root  = "bold red"
format      = "[$user]($style)"

[localip]
ssh_only = false
style    = "italic bright-black"
format   = "[@$localipv4]($style) "
disabled = false

[hostname]
disabled = true

# ─── Directory ────────────────────────────────────────────────────────────────
[directory]
style             = "bold yellow"
read_only         = "None"
truncation_length = 3
truncate_to_repo  = true

# ─── Git ──────────────────────────────────────────────────────────────────────
[git_branch]
style  = "bold cyan"
symbol = " "
format = "[$symbol$branch(:$remote_branch)]($style) "

[git_commit]
tag_symbol = '  '
style      = "bright-black"

[git_status]
style  = "bold red"
format = '([\[$all_status$ahead_behind\]]($style) )'

# ─── Languages ────────────────────────────────────────────────────────────────
[nodejs]
symbol = " "
style  = "bold green"
format = "[$symbol($version)]($style) "

[golang]
symbol = " "
style  = "bold cyan"
format = "[$symbol($version)]($style) "

[python]
symbol = " "
style  = "bold yellow"
format = "[$symbol($version)]($style) "

[rust]
symbol = "󱘗 "
style  = "bold red"
format = "[$symbol($version)]($style) "

[java]
symbol = " "
style  = "bold red"
format = "[$symbol($version)]($style) "

[kotlin]
symbol = " "
style  = "bold cyan"
format = "[$symbol($version)]($style) "

[lua]
symbol = " "
style  = "bold cyan"
format = "[$symbol($version)]($style) "

[php]
symbol = " "
style  = "bold cyan"
format = "[$symbol($version)]($style) "

[ruby]
symbol = " "
style  = "bold red"
format = "[$symbol($version)]($style) "

[swift]
symbol = " "
style  = "bold red"
format = "[$symbol($version)]($style) "

[zig]
symbol = " "
style  = "bold yellow"
format = "[$symbol($version)]($style) "

# ─── Tools ────────────────────────────────────────────────────────────────────
[docker_context]
symbol          = " "
style           = "bold cyan"
format          = "[$symbol$context]($style) "
only_with_files = true

[package]
symbol = "󰏗 "
style  = "bright-black"
format = "[$symbol$version]($style) "

[aws]
symbol = "  "
style  = "bold yellow"
format = '[$symbol($profile)(\($region\))]($style) '

[conda]
symbol = " "
style  = "bold green"
format = "[$symbol$environment]($style) "

[nix_shell]
symbol = " "
style  = "bold cyan"
format = '[$symbol$state(\($name\))]($style) '

[buf]
symbol = " "
style  = "bold cyan"
format = "[$symbol($version)]($style) "

# ─── Right ────────────────────────────────────────────────────────────────────
[cmd_duration]
min_time = 2000
style    = "bright-black"
format   = "[$duration]($style) "

[time]
disabled    = false
style       = "bright-black"
format      = "[$time]($style)"
time_format = "%H:%M"
