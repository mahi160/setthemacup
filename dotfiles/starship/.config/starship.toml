# ============================================================================
# STARSHIP CONFIGURATION
# Gruvbox Material themed — matches tmux, Neovim, Ghostty
# ============================================================================
# Explicit format = only listed modules are even checked — fastest possible
# Colors: acc1=#d8a657 acc2=#a9b665 acc3=#e78a4e acc4=#7daea3 gray=#928374
# ============================================================================

scan_timeout    = 10     # ms — prevents slow prompts in large repos
command_timeout = 500    # ms — max time for any shell command module
add_newline     = true

# Two-line prompt:
#   [os] ~/path/dir  branch ±status  node go py rust  ········  2.3s 14:22
#   ❯
format = """
$os$directory$git_branch$git_status$nodejs$golang$python$rust$docker_context$fill$cmd_duration$time
$character"""

# ─── Prompt Character ─────────────────────────────────────────────────────────
[character]
success_symbol = "[❯](bold #a9b665)"
error_symbol   = "[❯](bold #e46876)"

# ─── Directory ────────────────────────────────────────────────────────────────
[directory]
style             = "bold #d8a657"
read_only         = " 󰌾"
truncation_length = 3
truncate_to_repo  = true

# ─── Git ──────────────────────────────────────────────────────────────────────
[git_branch]
symbol = " "
style  = "bold #a9b665"
format = "[$symbol$branch(:$remote_branch)]($style) "

[git_status]
style  = "bold #e78a4e"
format = '([$all_status$ahead_behind]($style) )'

[git_commit]
tag_symbol = "  "
style      = "#928374"

# ─── OS icon ──────────────────────────────────────────────────────────────────
[os]
disabled = false
style    = "bold #7daea3"
format   = "[$symbol]($style)"

[os.symbols]
Macos   = " "
Linux   = " "
Windows = "󰍲 "
Unknown = " "

# ─── Languages (shown only when inside a matching project) ───────────────────
[nodejs]
symbol = " "
style  = "bold #a9b665"
format = "[$symbol($version)]($style) "

[golang]
symbol = " "
style  = "bold #7daea3"
format = "[$symbol($version)]($style) "

[python]
symbol = " "
style  = "bold #d8a657"
format = "[$symbol($version)]($style) "

[rust]
symbol = "󱘗 "
style  = "bold #e78a4e"
format = "[$symbol($version)]($style) "

[docker_context]
symbol = " "
style  = "bold #7daea3"
format = "[$symbol$context]($style) "
only_with_files = true

# ─── Right side ───────────────────────────────────────────────────────────────
[fill]
symbol = " "

[cmd_duration]
min_time = 2000
style    = "#928374"
format   = "[$duration]($style) "

[time]
disabled     = false
style        = "#928374"
format       = "[$time]($style)"
time_format  = "%H:%M"

# ─── Disabled — not needed on a personal machine ──────────────────────────────
[username]
show_always = false
disabled    = true

[hostname]
disabled = true

[localip]
disabled = true
