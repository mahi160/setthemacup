# ─────────────────────────────────────────────────────────────────────────────
# tmux.conf — kanagawa wave, vi-style, no plugins
# ─────────────────────────────────────────────────────────────────────────────
# Prefix : C-a
# Splits : C-a -  (horiz)   C-a \  (vert)
# Panes  : C-a h/j/k/l      C-a H/J/K/L (resize)   C-a z (zoom)
# Windows: C-a c (new)  , (rename)  & (kill)  < > (move)  Tab (last)
# Copy   : C-a v (enter)  v (select)  y (yank → pbcopy)
# Session: C-a @ (kill)  N (new)  S (switch)
# Popups : M-p (terminal)  M-o (pi Q&A)  M-n (note)  M-l (learn)
# Misc   : C-a r (reload)  C-a m (mouse toggle)
# ─────────────────────────────────────────────────────────────────────────────

# ── Terminal ──────────────────────────────────────────────────────────────────

set -g  default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"
set -ga terminal-overrides ",ghostty:Tc"
set -gp allow-passthrough on
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
set -as terminal-overrides ',*:Setulc=\E[58::2::::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'
set -g  focus-events on

# ── Behaviour ─────────────────────────────────────────────────────────────────

set  -sg escape-time 10        # safe minimum for Neovim
set  -g  history-limit 15000
set  -g  display-time 2000
set  -g  status-interval 5
set  -g  base-index 1
set  -g  renumber-windows on
set  -g  mouse on
set  -g  extended-keys on
set  -g  extended-keys-format csi-u
setw -g  aggressive-resize on
setw -g  pane-base-index 1

# ── Environment ───────────────────────────────────────────────────────────────

set-environment -g SETTHEMACUP "#{?#{==:#{SETTHEMACUP},},#{HOME}/.setup,#{SETTHEMACUP}}"

# ── Prefix ────────────────────────────────────────────────────────────────────

unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ── Keybindings ───────────────────────────────────────────────────────────────

# Reload
unbind r
bind r source-file ~/.config/tmux/tmux.conf \; display "✓ reloaded"

# Splits (preserve path)
unbind %
unbind '"'
bind - split-window -v -c "#{pane_current_path}"
bind \\ split-window -h -c "#{pane_current_path}"

# Pane navigation (vi)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Pane resize (vi, repeatable)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Windows
bind c new-window -c "#{pane_current_path}"
bind , command-prompt -I "#W" "rename-window '%%'"
bind & confirm-before -p "☠  kill-window #W? (y/n)" kill-window
bind -r < swap-window -t -1 \; select-window -t -1
bind -r > swap-window -t +1 \; select-window -t +1
bind -r p previous-window
bind -r n next-window
bind Tab last-window

# Copy mode (vi)
unbind v
bind v copy-mode
setw -g mode-keys vi
bind -T copy-mode-vi v   send-keys -X begin-selection
bind -T copy-mode-vi y   send-keys -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"

# Mouse toggle
bind m set -g mouse \; display "Mouse: #{?mouse,ON,OFF}"

# Session
bind -r @ confirm-before -p "☠  kill-session #S? (y/n)" kill-session
bind N command-prompt -p "New session name:" "new-session -s '%%'"
bind S choose-session

# Popups
bind-key -n M-p display-popup -d '#{pane_current_path}' -w 80% -h 60% -E
bind-key -n M-o display-popup -w 80% -h 70% -E "$HOME/.local/bin/pi-qna"
bind-key -n M-n display-popup -w 60% -h 20% -E "$HOME/.local/bin/quick-note"
bind-key -n M-l display-popup -w 60% -h 20% -E "$HOME/.local/bin/quick-learn"

# ── Theme: Kanagawa Wave ──────────────────────────────────────────────────────

set -g @thm_bg      "#1f1f28"
set -g @thm_fg      "#dcd7ba"
set -g @thm_acc1    "#957fb8"  # oniViolet    — session badge, pane border
set -g @thm_acc2    "#e6c384"  # carpYellow   — active window tab
set -g @thm_acc3    "#e46876"  # waveRed      — prefix, highlights
set -g @thm_acc4    "#957fb8"  # oniViolet    — nowplaying segment
set -g @thm_gray    "#727169"  # fujiGray     — separators, inactive
set -g @thm_darkgray "#2a2a37" # sumiInk2     — status bar bg

# ── Status bar ────────────────────────────────────────────────────────────────

set -g status on
set -g status-position bottom
set -g status-justify  absolute-centre
set -g status-left-length  100
set -g status-right-length 100

set -g status-style          "bg=#{@thm_darkgray},fg=#{@thm_fg}"
set -g window-status-format         "#[fg=#{@thm_gray}] #I:#W "
set -g window-status-current-format "#[fg=#{@thm_bg},bg=#{@thm_acc2},bold] #I:#W "
set -g window-status-separator      ""

# Left: session badge (⌨ PREFIX on prefix) + nowplaying
set -g status-left "#[bg=#{?client_prefix,#{@thm_acc3},#{@thm_acc1}},fg=#{@thm_bg},bold]#{?client_prefix, ⌨  prefix  , \uf2ac  #(basename \"#S\") }#[default] #[fg=#{@thm_aqua}]#(~/.local/bin/tmux-nowplaying)#[default]"

# Pane borders
set -g pane-border-style        "fg=#{@thm_gray}"
set -g pane-active-border-style "fg=#{@thm_acc1}"

# Inactive pane dim
set -g window-style        "fg=#{@thm_gray},bg=default"
set -g window-active-style "fg=#{@thm_fg},bg=default"

# Messages & copy mode
set -g message-style         "bg=#{@thm_acc3},fg=#{@thm_bg}"
set -g message-command-style "bg=#{@thm_acc4},fg=#{@thm_bg}"
set -g mode-style            "bg=#{@thm_acc2},fg=#{@thm_bg}"


set -g status-right "#(~/.local/bin/tmux-git #{q:pane_current_path}) #[fg=#{@thm_gray}]│ #[fg=#{@thm_acc3}]󰆍 #{pane_current_command} #[fg=#{@thm_gray}]│ #(python3 ~/.setup/claude-tmux.py)"
set -g status-interval 300
