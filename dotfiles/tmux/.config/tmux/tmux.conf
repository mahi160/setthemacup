# --- GRUVBOX MATERIAL (active) ---
set -g @thm_bg "#282828"
set -g @thm_fg "#dfbf8e"
set -g @thm_acc1 "#d8a657"    # yellow  — session name, active window
set -g @thm_acc2 "#a9b665"    # green   — secondary accents
set -g @thm_acc3 "#e78a4e"    # orange  — highlights
set -g @thm_acc4 "#7daea3"    # aqua    — nowplaying
set -g @thm_gray "#928374"
set -g @thm_darkgray "#32302f"

# ============================================================================
# STATUS BAR
# ============================================================================

set -g status on
set -g status-position bottom
set -g status-justify centre
set -g status-left-length 100
set -g status-right-length 100

# Main bar style
set -g status-style "bg=#{@thm_darkgray},fg=#{@thm_fg}"

# Window list style
set -g window-status-format "#[fg=#{@thm_gray}] #I:#W "
set -g window-status-current-format "#[fg=#{@thm_bg},bg=#{@thm_acc1},bold] #I:#W "
set -g window-status-separator ""

# Left: session name + nowplaying (uses pre-compiled binary for ~5ms vs 155ms)
set -g status-left "#[bg=#{@thm_acc2},fg=#{@thm_bg},bold]  #(basename \"#S\") #[default] #[fg=#{@thm_acc4}]#(out=$($HOME/.local/bin/nowplaying-mediaremote 2>/dev/null); [ -n \"$out\" ] && printf '♪ %s' \"$out\")"

# Right: Battery, CPU, current command, date/time
set -g status-right "#[fg=#{@thm_acc1}]#(~/.local/bin/tmux-battery) #[fg=#{@thm_gray}]| #[fg=#{@thm_acc2}]#(~/.local/bin/tmux-cpu) #[fg=#{@thm_gray}]| #[fg=#{@thm_acc3}]󰆍 #(basename \"#{pane_current_command}\") #[fg=#{@thm_gray}]| #[fg=#{@thm_fg}]%H:%M %d-%b "

# Pane border styles
set -g pane-border-style "fg=#{@thm_gray}"
set -g pane-active-border-style "fg=#{@thm_acc1}"

# Dim inactive panes
set -g window-style "fg=#{@thm_gray},bg=default"
set -g window-active-style "fg=#{@thm_fg},bg=default"

# Message styles
set -g message-style "bg=#{@thm_acc1},fg=#{@thm_bg}"
set -g message-command-style "bg=#{@thm_acc2},fg=#{@thm_bg}"

# Copy mode styles
set -g mode-style "bg=#{@thm_acc1},fg=#{@thm_bg}"

# ============================================================================
# POPUPS
# ============================================================================

# Quick terminal popup (current path)
bind-key -n M-p display-popup -d '#{pane_current_path}' -w 80% -h 60% -E

# Quick Q&A with minimal pi (haiku + no extensions/skills) — fast model
bind-key -n M-o display-popup -w 80% -h 70% -E "$HOME/.local/bin/pi-qna"

# Quick note / learn — closes on Esc
bind-key -n M-n display-popup -w 60% -h 20% -E "$HOME/.local/bin/quick-note"
bind-key -n M-l display-popup -w 60% -h 20% -E "$HOME/.local/bin/quick-learn"

