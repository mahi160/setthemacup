# ============================================================================
# TMUX CONFIGURATION
# Eye-comfort themed, vi-style workflow with performance optimizations
# ============================================================================
# Quick Reference:
#   Prefix: C-a
#   Reload config: C-a r
#
#   Splits: C-a - (horizontal) | C-a \ (vertical)
#   Navigate panes: C-a h/j/k/l
#   Resize panes: C-a H/J/K/L
#   Zoom pane: C-a z
#
#   New window: C-a c
#   Next/Prev window: C-a n/p or C-a [num]
#   Rename window: C-a ,
#   Kill window: C-a &
#   Move window: C-a < or C-a >
#
#   Copy mode: C-a v
#   Begin selection: v (in copy mode)
#   Copy selection: y (in copy mode)
#
#   Toggle mouse: C-a m
#   Kill session: C-a @
#   New session: C-a N
#   Popup terminal: M-p
#   Quick Q&A: M-o
#   Quick note: M-n
# ============================================================================

# ============================================================================
# TERMINAL SETTINGS
# ============================================================================

set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"
set -ga terminal-overrides ",ghostty:Tc"
# Undercurl support
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
set -as terminal-overrides ',*:Setulc=\E[58::2::::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'

# Enable focus events for Neovim
set -g focus-events on

# ============================================================================
# PERFORMANCE & INTEGRATION
# ============================================================================

# 10ms: imperceptible to humans, safe for Neovim and other TUIs
set -sg escape-time 10

# Reduce history for long-running sessions (memory-friendly)
# 15k lines = ~30-50MB per pane, good balance of history vs. memory
set -g history-limit 15000

# Display messages for 2 seconds
set -g display-time 2000

# 5s: battery/cpu are fine; nowplaying needs to feel responsive on song change
set -g status-interval 5

# Aggressive resize (useful when grouped sessions)
setw -g aggressive-resize on

# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# Enable mouse support (toggle with C-a m)
set -g mouse on

# Extended keys (CSI-u) — needed for some Neovim keymaps
set -g extended-keys on
set -g extended-keys-format csi-u

# ============================================================================
# PREFIX
# ============================================================================

unbind C-b
set -g prefix C-a
# Send prefix to nested tmux session
bind C-a send-prefix

# ============================================================================
# GENERAL KEYBINDINGS
# ============================================================================

# Reload config
unbind r
bind r source-file ~/.config/tmux/tmux.conf \; display "✓ Tmux config reloaded"

# ============================================================================
# PANE MANAGEMENT
# ============================================================================

# Splits (path preserved)
unbind %
unbind '"'
bind - split-window -v -c "#{pane_current_path}"
bind \\ split-window -h -c "#{pane_current_path}"

# Vi-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Vi-style pane resizing
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5


# ============================================================================
# WINDOW MANAGEMENT
# ============================================================================

# Create new window
bind c new-window -c "#{pane_current_path}"

# Rename window
bind , command-prompt -I "#W" "rename-window '%%'"

# Kill window
bind & confirm-before -p "kill-window #W? (y/n)" kill-window

# Move windows left/right
bind -r < swap-window -t -1 \; select-window -t -1
bind -r > swap-window -t +1 \; select-window -t +1

# Quick window switching
bind -r p previous-window
bind -r n next-window

# Switch to last window
bind Tab last-window

# ============================================================================
# COPY MODE (Vi-style)
# ============================================================================

# Enter copy mode
unbind v
bind v copy-mode

# Vi-style copy mode keys
setw -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle

# Copy to system clipboard on mouse drag end
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"

# ============================================================================
# MOUSE CONFIGURATION
# ============================================================================

# Toggle mouse on/off
bind m set -g mouse \; display "Mouse: #{?mouse,ON,OFF}"

# ============================================================================
# SESSION MANAGEMENT
# ============================================================================

# Kill session
bind -r @ kill-session

# New session
bind N command-prompt -p "New session name:" "new-session -s '%%'"

# Switch sessions
bind S choose-session

# ============================================================================
# ENVIRONMENT
# ============================================================================

# Forward SETTHEMACUP into every tmux session/pane/popup so scripts can find
# the repo regardless of how the session was started.
set-environment -g SETTHEMACUP "#{?#{==:#{SETTHEMACUP},},#{HOME}/.setup,#{SETTHEMACUP}}"

# ============================================================================
# THEME CONFIGURATION
# ============================================================================
# Three eye-comfort themes available. Uncomment one set to switch.
# Current: Gruvbox Material (matches Neovim & pi theme)
# ============================================================================

