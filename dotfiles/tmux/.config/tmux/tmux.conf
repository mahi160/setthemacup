# ====================
# Tmux Configuration
# ====================

# Terminal & Undercurl
set -g default-terminal "${TERM}"
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
set -as terminal-overrides ',*:Setulc=\E[58::2::::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'

# Indexing
set -g base-index 1
set -g pane-base-index 1

# Prefix
unbind C-b
set -g prefix C-a
set -g prefix2 none

# Reload config
unbind r
bind r source-file ~/.config/tmux/tmux.conf \; display "Tmux config reloaded"

# Splits (path preserved)
unbind %
unbind '"'
bind - split-window -v -c "#{pane_current_path}"
bind \\ split-window -h -c "#{pane_current_path}"

# Copy Mode (vi)
unbind v
bind v copy-mode
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection
setw -g mode-keys vi
unbind -T copy-mode-vi MouseDragEnd1Pane

# Resize
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5
bind -r z resize-pane -Z

# Mouse toggle
bind m set -g mouse \; display "Mouse: #{?mouse,ON,OFF}"

# Session
bind -r @ kill-session
bind n command-prompt -p "new-session -s '%%'"

# ====================
# Gruvbox Material Colors
# ====================
set -g @thm_bg "#282828"          # bg0
set -g @thm_fg "#dfbf8e"          # fg0
set -g @thm_acc1 "#d8a657"        # yellow (primary accent)
set -g @thm_acc2 "#a9b665"        # green (secondary accent)
set -g @thm_acc3 "#e78a4e"        # orange (highlight)
set -g @thm_gray "#928374"        # grey0
set -g @thm_darkgray "#32302f"    # bg1 (slightly lighter bg)

# ====================
# Status Bar
# ====================
set -g status on
set -g status-interval 2
set -g status-justify centre
set -g status-left-length 40
set -g status-right-length 100
set -g status-position bottom

# Main bar style
set -g status-style "bg=#{@thm_darkgray},fg=#{@thm_fg}"

# Window list style
set -g window-status-format "#[fg=#{@thm_gray}] #I:#W "
set -g window-status-current-format "#[fg=#{@thm_bg},bg=#{@thm_acc1},bold] #I:#W "
set -g window-status-style "bg=#{@thm_darkgray}"

# Left side: Session name
set -g status-left "#[bg=#{@thm_acc2},fg=#{@thm_bg},bold]  #(basename \"#S\") #[default] #[fg=#{@thm_acc3}]#{nowplaying}"

# Right side: Command and Uptime
set -g status-right "#[fg=#{@thm_acc1}] #(basename \"#{pane_current_command}\") #[fg=#{@thm_gray}]| #[fg=#{@thm_acc2}] #(uptime | awk '{print $3, $4}' | tr -d ',') "

# ====================
# Popups
# ====================
bind-key -n M-p display-popup -d '#{pane_current_path}' -w 80% -h 60%
bind-key -n M-n display-popup -w60% -h20% -E "/bin/bash -c 'read -p \"Note: \" note && $HOME/Documents/Coding/Projects/setthemacup/scripts/note.sh \"\$note\"'"

# ====================
# TPM Plugins
# ====================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'barlevalon/tmux-nowplaying'
run '~/.config/tmux/plugins/tpm/tpm'
