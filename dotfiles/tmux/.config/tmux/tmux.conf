# set -g @thm_fg "#dcd7ba"          # fg
# set -g @thm_acc1 "#7e9cd8"        # blue (primary accent)
# set -g @thm_acc2 "#98bb6c"        # green (secondary accent)
# set -g @thm_acc3 "#e46876"        # red (highlight)
# set -g @thm_gray "#727169"        # grey1
# set -g @thm_darkgray "#2a2a37"    # bg1 (slightly lighter bg)

# --- GRUVBOX MATERIAL THEME (Alternative 2) ---
set -g @thm_bg "#282828"          # bg0
set -g @thm_fg "#dfbf8e"          # fg0
set -g @thm_acc1 "#d8a657"        # yellow (primary accent)
set -g @thm_acc2 "#a9b665"        # green (secondary accent)
set -g @thm_acc3 "#e78a4e"        # orange (highlight)
set -g @thm_gray "#928374"        # grey0
set -g @thm_darkgray "#32302f"    # bg1 (slightly lighter bg)

# ============================================================================
# STATUS BAR
# ============================================================================

set -g status on
set -g status-position bottom
set -g status-justify centre
set -g status-left-length 100
set -g status-right-length 100

# Main bar style
set -g status-style "bg=#{@thm_darkgray},fg=#{@thm_fg}"

# Window list style
set -g window-status-format "#[fg=#{@thm_gray}] #I:#W "
set -g window-status-current-format "#[fg=#{@thm_bg},bg=#{@thm_acc1},bold] #I:#W "
set -g window-status-separator ""

# Left side: Icon, Session name, and now playing
set -g status-left "#[bg=#{@thm_acc2},fg=#{@thm_bg},bold]  #(basename \"#S\") #[default] #[fg=#{@thm_acc4}]#{nowplaying}"

# Right side: Battery, CPU, Command, Date/Time
set -g status-right "#[fg=#{@thm_acc1}]#{battery_icon} #{battery_percentage} #[fg=#{@thm_gray}]| #[fg=#{@thm_acc2}]#{cpu_icon} #{cpu_percentage} #[fg=#{@thm_gray}]| #[fg=#{@thm_acc3}]󰆍 #(basename \"#{pane_current_command}\") #[fg=#{@thm_gray}]| #[fg=#{@thm_fg}]%H:%M %d-%b "

# Pane border styles
set -g pane-border-style "fg=#{@thm_gray}"
set -g pane-active-border-style "fg=#{@thm_acc1}"

# Message styles
set -g message-style "bg=#{@thm_acc1},fg=#{@thm_bg}"
set -g message-command-style "bg=#{@thm_acc2},fg=#{@thm_bg}"

# Copy mode styles
set -g mode-style "bg=#{@thm_acc1},fg=#{@thm_bg}"

# ============================================================================
# POPUPS
# ============================================================================

# Quick terminal popup
bind-key -n M-p display-popup -d '#{pane_current_path}' -w 80% -h 60% -E

# Quick note/learn popups
bind-key -n M-n display-popup -w60% -h20% -E "/bin/bash -c 'read -p \"Note (text #tags): \" note && $HOME/Documents/Coding/Projects/setthemacup/scripts/note.sh note \"\$note\"'"
bind-key -n M-l display-popup -w60% -h20% -E "/bin/bash -c 'read -p \"Learn (text #tags): \" learn && $HOME/Documents/Coding/Projects/setthemacup/scripts/note.sh learn \"\$learn\"'"

# ============================================================================
# TPM PLUGINS
# ============================================================================

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'barlevalon/tmux-nowplaying'

# Plugin configurations
set -g @resurrect-strategy-nvim 'session'
set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# Battery plugin colors
set -g @batt_icon_charge_tier8 '󰁹'
set -g @batt_icon_charge_tier7 '󰂁'
set -g @batt_icon_charge_tier6 '󰂀'
set -g @batt_icon_charge_tier5 '󰁿'
set -g @batt_icon_charge_tier4 '󰁾'
set -g @batt_icon_charge_tier3 '󰁽'
set -g @batt_icon_charge_tier2 '󰁼'
set -g @batt_icon_charge_tier1 '󰁻'
set -g @batt_icon_status_charged '󰚥'
set -g @batt_icon_status_charging '󰂄'

# CPU plugin icons
set -g @cpu_low_icon "󰾆"
set -g @cpu_medium_icon "󰾅"
set -g @cpu_high_icon "󰀪"

set -g extended-keys on
set -g extended-keys-format csi-u

# Initialize TPM (keep this at the very bottom)
run '~/.config/tmux/plugins/tpm/tpm'
