# ============================================================================
# TMUX CONFIGURATION
# Eye-comfort themed, vi-style workflow with performance optimizations
# ============================================================================
# Quick Reference:
#   Prefix: C-a
#   Reload config: C-a r
#
#   Splits: C-a - (horizontal) | C-a \ (vertical)
#   Navigate panes: C-a h/j/k/l
#   Resize panes: C-a H/J/K/L
#   Zoom pane: C-a z
#
#   New window: C-a c
#   Next/Prev window: C-a n/p or C-a [num]
#   Rename window: C-a ,
#   Kill window: C-a &
#   Move window: C-a < or C-a >
#
#   Copy mode: C-a v
#   Begin selection: v (in copy mode)
#   Copy selection: y (in copy mode)
#
#   Toggle mouse: C-a m
#   Kill session: C-a @
#   New session: C-a N
#   Popup terminal: M-p
#   Quick note: M-n
# ============================================================================

# ============================================================================
# TERMINAL SETTINGS
# ============================================================================

# Default terminal with true color support
set -g default-terminal "${TERM}"
set -ga terminal-overrides ",xterm-256color:Tc"
set -ga terminal-overrides ",alacritty:Tc"
set -ga terminal-overrides ",*256col*:Tc"
set-option -g utf8-on on

# Undercurl support
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
set -as terminal-overrides ',*:Setulc=\E[58::2::::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'

# Enable focus events for Neovim
set -g focus-events on

# ============================================================================
# PERFORMANCE & INTEGRATION
# ============================================================================

# Faster escape time (important for Neovim)
set -sg escape-time 0

# Increase scrollback buffer
set -g history-limit 50000

# Display messages for 2 seconds
set -g display-time 2000

# Refresh status more often
set -g status-interval 5

# Aggressive resize (useful when grouped sessions)
setw -g aggressive-resize on

# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# Enable mouse support (toggle with C-a m)
set -g mouse on

# ============================================================================
# PREFIX
# ============================================================================

unbind C-b
set -g prefix C-a
set -g prefix2 none

# Send prefix to nested tmux session
bind C-a send-prefix

# ============================================================================
# GENERAL KEYBINDINGS
# ============================================================================

# Reload config
unbind r
bind r source-file ~/.config/tmux/tmux.conf \; display "✓ Tmux config reloaded"

# ============================================================================
# PANE MANAGEMENT
# ============================================================================

# Splits (path preserved)
unbind %
unbind '"'
bind - split-window -v -c "#{pane_current_path}"
bind \\ split-window -h -c "#{pane_current_path}"

# Vi-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Vi-style pane resizing
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Zoom pane
bind -r z resize-pane -Z

# ============================================================================
# WINDOW MANAGEMENT
# ============================================================================

# Create new window
bind c new-window -c "#{pane_current_path}"

# Rename window
bind , command-prompt -I "#W" "rename-window '%%'"

# Kill window
bind & confirm-before -p "kill-window #W? (y/n)" kill-window

# Move windows left/right
bind -r < swap-window -t -1 \; select-window -t -1
bind -r > swap-window -t +1 \; select-window -t +1

# Quick window switching
bind -r p previous-window
bind -r n next-window

# Switch to last window
bind Tab last-window

# ============================================================================
# COPY MODE (Vi-style)
# ============================================================================

# Enter copy mode
unbind v
bind v copy-mode

# Vi-style copy mode keys
setw -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle

# Don't exit copy mode on mouse drag end
unbind -T copy-mode-vi MouseDragEnd1Pane

# macOS clipboard integration
if-shell "uname | grep -q Darwin" {
  bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
  bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"
}

# ============================================================================
# MOUSE CONFIGURATION
# ============================================================================

# Toggle mouse on/off
bind m set -g mouse \; display "Mouse: #{?mouse,ON,OFF}"

# ============================================================================
# SESSION MANAGEMENT
# ============================================================================

# Kill session
bind -r @ kill-session

# New session
bind N command-prompt -p "New session name:" "new-session -s '%%'"

# Switch sessions
bind S choose-session

# ============================================================================
# THEME CONFIGURATION
# ============================================================================
# Three eye-comfort themes available. Uncomment one set to switch themes.
# Current: Everforest (matches Neovim & Ghostty default)
# ============================================================================

