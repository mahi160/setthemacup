# Prepend custom bindings — extends defaults without replacing them
# Full default keymap: https://github.com/sxyazi/yazi/blob/shipped/yazi-config/preset/keymap-default.toml

[[mgr.prepend_keymap]]
on   = ["g", "l"]
run  = "shell --block 'lazygit'"
desc = "Open lazygit in current directory"

[[mgr.prepend_keymap]]
on   = ["y", "p"]
run  = "yank --path"
desc = "Copy absolute path to clipboard"

[[mgr.prepend_keymap]]
on   = "<C-r>"
run  = "refresh"
desc = "Refresh directory"

[[mgr.prepend_keymap]]
on   = "."
run  = "toggle_hidden"
desc = "Toggle hidden files (dotfiles)"
